name: "Conservative Funded"
description: "Preserva il capitale, payout costanti, drawdown minimo per gestione long-term"

risk:
  per_trade_pct: 0.5
  max_daily_pct: 1.5
  max_concurrent_trades: 2

targets:
  monthly_target_pct: 5.0       # Per payout regolari
  daily_profit_target_pct: 0.3

strategy_preferences:
  preferred_types:
    - "mean_reversion"
    - "swing_trading"
    - "trend_following"
  avoid_types:
    - "scalping_high_freq"
    - "news_trading"
    - "grid"
    - "martingale"
  
  preferred_timeframes:
    - "H1"
    - "H4"
    - "D1"
  
  preferred_session: "any"

trade_management:
  use_trailing_stop: true
  trailing_activation_pct: 1.0
  partial_take_profit: true
  partial_tp_levels: [0.33, 0.66]
  break_even_at_pct: 0.5

filters:
  news_block_minutes_before: 15
  news_block_minutes_after: 15
  max_spread_pips: 1.5
  min_atr_pips: 12.0

validation_thresholds:
  min_profit_factor: 1.8
  min_sharpe: 1.5
  max_drawdown_pct: 4.0
  min_win_rate: 0.50
