# ============================================================
# QUANT AGENT — CONFIG
# ============================================================
# Rename this file to config.yaml.
# The agent orchestrates algo_framework + datasea: it proposes experiments on
# strategies, runs them via CLI and judges them. It no longer generates MQL5.
# ============================================================

claude:
  api_key: "sk-ant-YOUR_ACTUAL_KEY_HERE"
  model: "claude-sonnet-4-6"        # used by StrategyResearcher + narrative
  max_tokens: 4096

# ============================================================
# TOOLS — Layer 2 adapters (algo_framework + datasea)
# ============================================================
# Both tools run in the same conda env (`workbench`).
# The agent does NOT import them: it runs their CLIs via subprocess and reads the
# JSON they export with --export-json (machine-readable contract).
tools:
  # algo_framework repo folder — commands run FROM HERE (relative imports)
  algo_framework_dir: "C:\\Mac\\Home\\Documents\\Repo\\algo_framework"
  # datasea data lake root (Delta Lake gold)
  datasea_data_root: "C:\\datasea_data"
  # gold table (per broker)
  datasea_table: "mt5_ohlcv_ftmo"
  # Python that has the workbench env (deltalake, polars, framework deps).
  # If you run the orchestrator ALREADY inside the workbench env, leave "python".
  python_exec: "python"
  # Alternatively wrap every command in `conda run -n <env>`:
  #   leave "" to use python_exec directly; e.g. "workbench" to wrap.
  conda_env: ""
  # Timeout (seconds) for a full backtest / robustness run
  backtest_timeout_s: 1800

database:
  url: "sqlite:///db/prop_agent.db"

orchestrator:
  cycle_hours: 4                    # how often a cycle starts
  max_experiments_per_cycle: 2      # how many experiments to propose/run per cycle
  # true (default): the agent works ONLY on strategies it generates (AI_*);
  #   if there are none, it creates them (author_new). Never touches your strategies.
  # false: for testing only, may also run on existing strategies.
  only_ai_strategies: true

# Used by the idea evaluator (dashboard) to contextualize the prop rules.
prop:
  target_firm: "ftmo"
  account_size: 10000
  phase: "free_trial"

validation_criteria:
  min_profit_factor: 1.5
  min_sharpe: 1.0
  max_drawdown_pct: 7.0
  min_trades: 50
  min_win_rate: 0.40
  max_consecutive_losses: 6

# Robustness gate (walk-forward + Monte Carlo) — MANDATORY for an APPROVE.
# A promising but non-robust backtest does NOT become a candidate: it's the
# defense against over-optimisation (the agent tries hundreds of configs and would
# keep the best "by luck"). Thresholds aligned to robustness.py ("acceptable risk").
robustness_gate:
  min_wf_consistency_pct: 70      # % of profitable OOS windows
  min_mc_prop_pass_pct: 70        # % of MC simulations that pass the challenge
  min_mc_prob_profitable_pct: 60  # % of MC simulations with final PnL > 0
