# Anaconda/Miniconda environment file
# Crea env con: conda env create -f environment.yml
# Aggiorna con:  conda env update -f environment.yml --prune

name: propagent
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  
  # Conda packages (ottimizzati con MKL su Windows)
  - pandas>=2.1.0
  - numpy>=1.26.0
  - sqlalchemy>=2.0.0
  - pyyaml>=6.0
  - pillow>=10.0.0
  - beautifulsoup4>=4.12.0
  - fastapi>=0.108.0
  - uvicorn>=0.25.0
  - jinja2>=3.1.2
  - httpx>=0.26.0
  - loguru>=0.7.2
  - python-multipart>=0.0.6
  
  # Pip-only packages
  - pip
  - pip:
    - anthropic>=0.40.0
    - pydantic>=2.5.0
    - python-dotenv>=1.0.0
    - MetaTrader5>=5.0.45
    - apscheduler>=3.10.4
    - python-telegram-bot>=20.7
    - pypdf>=4.0.0
    - python-docx>=1.1.0
