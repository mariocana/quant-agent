# ============================================================
# QUANT AGENT — CONFIG
# ============================================================
# Rinomina questo file in config.yaml.
# L'agente orchestra algo_framework + datasea: propone esperimenti su strategie
# esistenti, li esegue via CLI e li giudica. Non genera più codice MQL5.
# ============================================================

claude:
  api_key: "sk-ant-YOUR_ACTUAL_KEY_HERE"
  model: "claude-sonnet-4-6"        # usato da StrategyResearcher + narrativa
  max_tokens: 4096

# ============================================================
# TOOLS — Layer 2 adapters (algo_framework + datasea)
# ============================================================
# I due tool girano nello stesso conda env (`workbench`).
# L'agente NON li importa: lancia i loro CLI via subprocess e legge il JSON
# esportato con --export-json (contratto machine-readable).
tools:
  # Cartella del repo algo_framework — i comandi girano DA QUI (import relativi)
  algo_framework_dir: "C:\\Mac\\Home\\Documents\\Repo\\algo_framework"
  # Root del data lake datasea (Delta Lake gold)
  datasea_data_root: "C:\\datasea_data"
  # Tabella gold per broker
  datasea_table: "mt5_ohlcv_ftmo"
  # Python con l'env workbench (deltalake, polars, framework deps).
  # Se lanci l'orchestrator GIÀ dentro l'env workbench, lascia "python".
  python_exec: "python"
  # In alternativa avvolgi ogni comando in `conda run -n <env>`:
  #   lascia "" per usare python_exec direttamente; es. "workbench" per wrappare.
  conda_env: ""
  # Timeout (secondi) per un backtest / robustness completo
  backtest_timeout_s: 1800

database:
  url: "sqlite:///db/prop_agent.db"

orchestrator:
  cycle_hours: 4                    # ogni quante ore parte un ciclo
  max_experiments_per_cycle: 2      # quanti esperimenti propone/esegue per ciclo
  # true (default): l'agente lavora SOLO sulle strategie che genera lui (AI_*);
  #   se non ce ne sono, le crea (author_new). Non tocca mai le tue strategie.
  # false: SOLO per test/collaudo, può girare anche sulle strategie esistenti.
  only_ai_strategies: true

# Usato dall'idea evaluator (dashboard) per contestualizzare le regole prop.
prop:
  target_firm: "ftmo"
  account_size: 10000
  phase: "free_trial"

validation_criteria:
  min_profit_factor: 1.5
  min_sharpe: 1.0
  max_drawdown_pct: 7.0
  min_trades: 50
  min_win_rate: 0.40
  max_consecutive_losses: 6

# Robustness gate (walk-forward + Monte Carlo) — OBBLIGATORIO per un APPROVE.
# Un backtest promettente ma non robusto NON diventa candidate: è la difesa
# contro l'over-ottimizzazione (l'agente prova centinaia di config e terrebbe
# le migliori "per caso"). Soglie allineate a robustness.py ("rischio accettabile").
robustness_gate:
  min_wf_consistency_pct: 70      # % di finestre OOS profittevoli
  min_mc_prop_pass_pct: 70        # % simulazioni MC che passano la challenge
  min_mc_prob_profitable_pct: 60  # % simulazioni MC con PnL finale > 0
